version: "3.9"
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    build: .
    command: python -u main.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_DIR=/app/logs
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./movies.json:/app/movies.json:ro
      - ./bot_database.db:/app/bot_database.db
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "python", "-u", "healthcheck.py", "bot" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      - redis

  worker:
    build: .
    command: python -u tasks.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "python", "-u", "healthcheck.py", "worker" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis_data:
